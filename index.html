<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandy's Hut</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    color: #fff;
    overflow-x: hidden;
    background: linear-gradient(to bottom, #1a120b, #2c1e14);
}

/* 🌅 WARM PARALLAX BACKGROUND */
.bg {
    position: fixed;
    width: 100%;
    height: 120%;
    z-index: -1;
}

.bg1 {
    background: radial-gradient(circle at 50% 20%, rgba(255,170,100,0.35), transparent);
}

.bg2 {
    background: radial-gradient(circle at 60% 80%, rgba(255,120,60,0.25), transparent);
}

/* 🔝 NAVBAR UPGRADE */
nav {
    position: fixed;
    width: 100%;
    padding: 20px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(20,10,5,0.4);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: 0.3s;
    z-index: 100;
}

nav.scrolled {
    background: rgba(20,10,5,0.7);
    box-shadow: 0 5px 30px rgba(0,0,0,0.4);
}

/* LOGO */
.logo {
    font-weight: 600;
    letter-spacing: 0.5px;
}

/* LINKS */
nav a {
    margin-left: 30px;
    color: #e5e5e5;
    text-decoration: none;
    position: relative;
    font-size: 15px;
}

/* ✨ UNDERLINE ANIMATION */
nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0%;
    height: 2px;
    background: #facc15;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
}

.hero h2 {
    font-size: 64px;
    background: linear-gradient(90deg, #fff, #fbbf24, #fb923c);
    -webkit-background-clip: text;
    color: transparent;
}

.hero p {
    margin-top: 15px;
    color: #ddd;
}

.hero button {
    margin-top: 30px;
    padding: 12px 26px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(90deg, #fbbf24, #fb923c);
    color: black;
    font-weight: 500;
    cursor: pointer;
}

/* SECTION */
.section {
    padding: 120px 80px;
    text-align: center;
}

/* 🧊 GLASS CARDS */
.grid {
    margin-top: 60px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}

.card {
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,200,150,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,200,150,0.15);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
}

/* ✨ SCROLL ANIMATION */
.hidden {
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.8s ease;
}

.show {
    opacity: 1;
    transform: translateY(0);
}

/* FOOTER */
footer {
    padding: 60px;
    text-align: center;
    color: #bbb;
}
</style>
</head>

<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<nav id="navbar">
    <div class="logo">🏝️ Sandy's Hut</div>
    <div>
        <a href="#">Home</a>
        <a href="#projects">Projects</a>
        <a href="#">Downloads</a>
    </div>
</nav>

<section class="hero">
    <h2 class="hidden">Chill. Build. Share.</h2>
    <p class="hidden">your cozy corner on the internet</p>
    <button onclick="scrollToSection()">Explore</button>
</section>

<section class="section hidden" id="projects">
    <h2>Projects</h2>
    <div class="grid">
        <div class="card">Project 1</div>
        <div class="card">Project 2</div>
        <div class="card">Project 3</div>
    </div>
</section>

<section class="section hidden">
    <h2>Downloads</h2>
    <div class="grid">
        <div class="card">File 1<br><br><a href="#">Download →</a></div>
        <div class="card">File 2<br><br><a href="#">Download →</a></div>
    </div>
</section>

<footer class="hidden">
    © 2026 Sandy's Hut
</footer>

<script>
function scrollToSection() {
    document.getElementById("projects").scrollIntoView({behavior: "smooth"});
}

/* SCROLL REVEAL */
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".hidden").forEach(el => observer.observe(el));

/* PARALLAX */
window.addEventListener("scroll", () => {
    let scroll = window.scrollY;
    document.querySelector(".bg1").style.transform = `translateY(${scroll * 0.15}px)`;
    document.querySelector(".bg2").style.transform = `translateY(${scroll * 0.3}px)`;

    /* NAV EFFECT */
    if(scroll > 50){
        document.getElementById("navbar").classList.add("scrolled");
    } else {
        document.getElementById("navbar").classList.remove("scrolled");
    }
});
</script>

</body>
</html>
