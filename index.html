<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandy's Hut</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: linear-gradient(to bottom, #f8f5f0, #f1ece5);
    color: #1a1a1a;
    overflow-x: hidden;
}

/* 🌤️ SOFT PARALLAX */
.bg {
    position: fixed;
    width: 100%;
    height: 120%;
    z-index: -1;
}

.bg1 {
    background: radial-gradient(circle at 20% 20%, rgba(255,200,150,0.3), transparent);
}

.bg2 {
    background: radial-gradient(circle at 80% 80%, rgba(255,220,180,0.25), transparent);
}

/* 🔝 NAV */
nav {
    position: fixed;
    width: 100%;
    padding: 20px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.05);
    transition: 0.3s;
    z-index: 100;
}

nav.scrolled {
    background: rgba(255,255,255,0.85);
    box-shadow: 0 5px 25px rgba(0,0,0,0.08);
}

.logo {
    font-weight: 600;
}

nav a {
    margin-left: 30px;
    color: #555;
    text-decoration: none;
    position: relative;
}

/* underline */
nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 0%;
    height: 2px;
    background: #f59e0b;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
}

.hero h2 {
    font-size: 56px;
    font-weight: 600;
}

.hero p {
    margin-top: 15px;
    color: #666;
}

.hero button {
    margin-top: 30px;
    padding: 12px 26px;
    border-radius: 30px;
    border: none;
    background: #f59e0b;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.hero button:hover {
    transform: scale(1.05);
}

/* SECTION */
.section {
    padding: 120px 80px;
    text-align: center;
}

/* 🧊 CARDS */
.grid {
    margin-top: 60px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}

.card {
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,0,0,0.05);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

/* ✨ SCROLL */
.hidden {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease;
}

.show {
    opacity: 1;
    transform: translateY(0);
}

/* FOOTER */
footer {
    padding: 60px;
    text-align: center;
    color: #777;
}
</style>
</head>

<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<nav id="navbar">
    <div class="logo">🏝️ Sandy's Hut</div>
    <div>
        <a href="#">Home</a>
        <a href="#projects">Projects</a>
        <a href="https://sandy-hut.com/downloads/">Downloads</a>
    </div>
</nav>

<section class="hero">
    <h2 class="hidden">Welcome to Sandy’s Hut</h2>
    <p class="hidden">a calm place for your projects and ideas</p>
    <button onclick="scrollToSection()">Explore</button>
</section>

<section class="section hidden" id="projects">
    <h2>Projects</h2>
    <div class="grid">
        <div class="card">Sandy's Hut 1998</div>
        <div class="card">Project 2</div>
        <div class="card">Project 3</div>
    </div>
</section>

<section class="section hidden">
    <h2>Downloads</h2>
    <div class="grid">
        <div class="card">File 1<br><br><a href="#">Download →</a></div>
        <div class="card">File 2<br><br><a href="#">Download →</a></div>
    </div>
</section>

<footer class="hidden">
    © 2026 Sandy's Hut
</footer>

<script>
function scrollToSection() {
    document.getElementById("projects").scrollIntoView({behavior: "smooth"});
}

/* SCROLL REVEAL */
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".hidden").forEach(el => observer.observe(el));

/* PARALLAX */
window.addEventListener("scroll", () => {
    let scroll = window.scrollY;
    document.querySelector(".bg1").style.transform = `translateY(${scroll * 0.1}px)`;
    document.querySelector(".bg2").style.transform = `translateY(${scroll * 0.2}px)`;

    if(scroll > 50){
        document.getElementById("navbar").classList.add("scrolled");
    } else {
        document.getElementById("navbar").classList.remove("scrolled");
    }
});
</script>

</body>
</html>
